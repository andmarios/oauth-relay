# Optional: PVC can be removed when S3 backup is enabled.
# The database is restored from S3 on startup, so persistent local
# storage is not required (though it speeds up restarts).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oauth-token-relay-data
  labels:
    app: oauth-token-relay
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
