apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth-token-relay
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - oauth-relay.example.com
      secretName: oauth-token-relay-tls
  rules:
    - host: oauth-relay.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth-token-relay
                port:
                  name: http
