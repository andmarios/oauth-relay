apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-token-relay
  labels:
    app: oauth-token-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth-token-relay
  template:
    metadata:
      labels:
        app: oauth-token-relay
    spec:
      containers:
        - name: oauth-token-relay
          image: ghcr.io/andmarios/oauth-relay:latest
          args: ["-config", "/etc/oauth-token-relay/config.yaml"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            # Optional: remove data volume when using S3 backup
            # (the DB is restored from S3 on startup)
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/oauth-token-relay
              readOnly: true
          env:
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: oauth-token-relay
                  key: jwt-signing-key
            # Identity provider (SSO login)
            - name: GOOGLE_IDP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-token-relay
                  key: google-idp-client-id
            - name: GOOGLE_IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-token-relay
                  key: google-idp-client-secret
            # Relay provider (upstream API tokens)
            - name: GOOGLE_CORP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-token-relay
                  key: google-corp-client-id
            - name: GOOGLE_CORP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-token-relay
                  key: google-corp-client-secret
            # Optional: S3 backup credentials (omit if using IAM roles)
            # - name: AWS_ACCESS_KEY_ID
            #   valueFrom:
            #     secretKeyRef:
            #       name: oauth-token-relay
            #       key: aws-access-key-id
            # - name: AWS_SECRET_ACCESS_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: oauth-token-relay
            #       key: aws-secret-access-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        # Optional: remove PVC when using S3 backup
        # (the DB is restored from S3 on startup)
        - name: data
          persistentVolumeClaim:
            claimName: oauth-token-relay-data
        - name: config
          configMap:
            name: oauth-token-relay-config
