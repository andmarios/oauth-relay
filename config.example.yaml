# oauth-token-relay configuration
server:
  address: ":8085"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 15s

storage:
  driver: "sqlite"  # "sqlite" or "postgres"
  sqlite:
    path: "./data/relay.db"
  postgres:
    dsn: "postgres://user:pass@localhost:5432/relay?sslmode=disable"

backup:
  enabled: false
  bucket: ""
  prefix: "oauth-token-relay/"
  interval: 1h
  region: "us-east-1"

jwt:
  signing_key: "${JWT_SIGNING_KEY}"  # REQUIRED: 256-bit key, base64 encoded
  issuer: "oauth-token-relay"
  access_token_ttl: 1h
  refresh_token_ttl: 720h  # 30 days

providers:
  google-corp:
    display_name: "Google (example.com)"
    client_id: "${GOOGLE_CORP_CLIENT_ID}"
    client_secret: "${GOOGLE_CORP_CLIENT_SECRET}"
    authorize_url: "https://accounts.google.com/o/oauth2/v2/auth"
    token_url: "https://oauth2.googleapis.com/token"
    revoke_url: "https://oauth2.googleapis.com/revoke"
    extra_params:
      access_type: "offline"
      prompt: "consent"

  # zendesk:
  #   display_name: "Zendesk"
  #   client_id: "${ZENDESK_CLIENT_ID}"
  #   client_secret: "${ZENDESK_CLIENT_SECRET}"
  #   authorize_url: "https://YOUR_SUBDOMAIN.zendesk.com/oauth/authorizations/new"
  #   token_url: "https://YOUR_SUBDOMAIN.zendesk.com/oauth/tokens"
  #   revoke_url: "https://YOUR_SUBDOMAIN.zendesk.com/oauth/revoke"
  #   extra_params: {}

# Identity providers for SSO login (separate from relay providers)
# At least one is required — users authenticate via SSO to prove identity
identity_providers:
  google:
    display_name: "Google"
    client_id: "${GOOGLE_IDP_CLIENT_ID}"
    client_secret: "${GOOGLE_IDP_CLIENT_SECRET}"
    authorize_url: "https://accounts.google.com/o/oauth2/v2/auth"
    token_url: "https://oauth2.googleapis.com/token"
    userinfo_url: "https://www.googleapis.com/oauth2/v3/userinfo"
    scopes: ["openid", "email", "profile"]
    email_field: "email"
  # github:
  #   display_name: "GitHub"
  #   client_id: "${GITHUB_IDP_CLIENT_ID}"
  #   client_secret: "${GITHUB_IDP_CLIENT_SECRET}"
  #   authorize_url: "https://github.com/login/oauth/authorize"
  #   token_url: "https://github.com/login/oauth/access_token"
  #   userinfo_url: "https://api.github.com/user/emails"
  #   scopes: ["user:email"]
  #   email_field: "email"

admin:
  # First user with this email gets admin role automatically
  bootstrap_admins:
    - "admin@example.com"
